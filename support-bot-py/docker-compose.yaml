# create docker-compose nginx for hosting hw.html

version: '3.8'

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:9.6
    restart: unless-stopped
    env_file:
      - ../stack.env
    environment:
      TELEGRAM_LOCAL: "1"
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api

  support-bot-py:
    image: ghcr.io/martins0n/homelab-services/support-bot-py:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8000"
    env_file:
      - ../stack.env
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    depends_on:
      - telegram-bot-api

  # Heavyweight ML (pyannote/torch) kept out of the bot image. Built locally on the
  # host (too heavy for CI/QEMU); pull_policy:build so `up --pull always` won't try
  # to pull the local tag. Bot reaches it on the shared default network.
  ml-service:
    build: ../ml-service
    image: ml-service:latest
    pull_policy: build
    restart: unless-stopped
    env_file:
      - ../stack.env
    environment:
      HF_HOME: /models
      PYANNOTE_MODEL: pyannote/speaker-diarization-community-1
    volumes:
      - ml_models:/models

volumes:
  telegram_bot_api_data:
  ml_models:

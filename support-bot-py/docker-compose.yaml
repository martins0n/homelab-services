# create docker-compose nginx for hosting hw.html

version: '3.8'

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:9.6
    restart: unless-stopped
    env_file:
      - ../stack.env
    environment:
      TELEGRAM_LOCAL: "1"
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api

  support-bot-py:
    image: ghcr.io/martins0n/homelab-services/support-bot-py:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8000"
    env_file:
      - ../stack.env
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    depends_on:
      - telegram-bot-api

  # Speaker diarization kept out of the bot image; built in CI (arm64) and pulled
  # like the bot. Bot reaches it on the shared default network.
  # Default engine is sherpa-onnx (lightweight ONNX, CPU, ~10x faster than pyannote
  # on this board). Set ENGINE=pyannote (+ keep the ml_models volume for the HF
  # cache) to switch back to the higher-accuracy torch pipeline.
  ml-service:
    image: ghcr.io/martins0n/homelab-services/ml-service:latest
    restart: unless-stopped
    env_file:
      - ../stack.env
    environment:
      ENGINE: sherpa
      # Multilingual CAM++ embedder (robust on non-English); English-only
      # wespeaker over-split foreign speech. Auto speaker-count via threshold:
      # lower -> more speakers, raise toward 0.8 if voices still split. Pass
      # num_speakers to /diarize (e.g. bot's `/yd <url> 2`) to force an exact count.
      SHERPA_EMBEDDING_MODEL: /app/models/3dspeaker_campplus_sv_zh_en.onnx
      SHERPA_CLUSTER_THRESHOLD: "0.7"
      # pyannote engine only (ignored by sherpa):
      HF_HOME: /models
      PYANNOTE_MODEL: pyannote/speaker-diarization-community-1
    volumes:
      - ml_models:/models

volumes:
  telegram_bot_api_data:
  ml_models:
